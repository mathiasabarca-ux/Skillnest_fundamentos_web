<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro Discord Simple</title>
</head>
<body>
<br>
    <h1>Crear una cuenta en Discord</h1>
    
    <form>
        <div>
            <label>Nombre:</label>
            <input type="text">
        </div>
<br>
        <div>
            <label>Apellido:</label>
            <input type="text">
        </div>
<br>
        <div>
            <label>Correo electrónico:</label>
            <input type="email">
        </div>
<br>
        <div>
            <label>Contraseña:</label>
            <input type="password">
        </div>
<br>
        <div>
            <label>Confirmar contraseña:</label>
            <input type="password">
        </div>
<br>
        <div>
            <label>Fecha de nacimiento:</label>
            <input type="date">
        </div>
<br>
        <div>
            <label>Género:</label>
            <input type="radio" name="g"> Masculino
            <input type="radio" name="g"> Femenino
            <input type="radio" name="g"> Prefiero no decirlo
        </div>
<br>
        <div>
            <label>Descripción sobre ti:</label><br>
            <textarea rows="4" cols="30"></textarea>
        </div>
<br>
        <div>
            <label>Selecciona tus intereses:</label><br>
            <select multiple size="4">
                <option>Música</option>
                <option>Películas</option>
                <option>Deportes</option>
                <option>Tecnología</option>
            </select>
        </div>
<br>
        <div>
            <input type="checkbox"> Al registrarte, aceptas los 
            <a href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR1RDr8EuFxagFF35lAyU1fYlI-IPd0rAI5Ag&s" target="_blank">Términos y condiciones</a> de Discord.
        </div>
<br>
        <button type="submit">Registrarse</button>
    </form>

</body>
</html>
